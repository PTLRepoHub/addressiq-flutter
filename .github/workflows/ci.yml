name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK · analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Errors fail CI; the freshly-extracted SDK still carries style-lint debt
      # (prefer_const, deprecated_member_use), so infos/warnings are non-fatal.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  example:
    name: Example · analyze (local SDK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # `addressiq_sdk: { path: ../ }` resolves to the SDK at the repo root.
      - run: flutter pub get
      # Errors fail CI; the freshly-extracted SDK still carries style-lint debt
      # (prefer_const, deprecated_member_use), so infos/warnings are non-fatal.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
