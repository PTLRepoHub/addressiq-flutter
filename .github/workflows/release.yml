name: Release

# Publishes addressiq_sdk to pub.dev. Push a tag `vX.Y.Z` to release at that
# version, or run manually (dry-run by default).
#
# Auth: pub.dev OIDC trusted publishing — configure this repo as a trusted
# publisher on pub.dev (no secret needed).
#
# ⚠ pub.dev publishes are PERMANENT and PUBLIC. There is no unpublish.
#
# Every other SDK's release path is implicitly gated by a missing secret
# (NPM_TOKEN, COCOAPODS_TRUNK_TOKEN, CENTRAL_TOKEN_*). OIDC needs no secret, so
# a tag alone would be enough to publish this proprietary package forever.
# Hence an explicit gate: the repository variable PUB_DEV_PUBLISH must be
# exactly "true" or the job downgrades itself to a dry run.
#
#   gh variable set PUB_DEV_PUBLISH --repo PTLRepoHub/addressiq-flutter --body true

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate packaging, publish nothing)"
        type: boolean
        default: true

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Set version from tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            sed -i "s/^version: .*/version: ${GITHUB_REF_NAME#v}/" pubspec.yaml
          fi
      - run: flutter pub get
      # Regenerates lib/src/generated/build_config.dart from the repository
      # variables below — three URLs (api, ingest, cdn) per shippable
      # environment. `development` is not baked: it is a local-only concern.
      #
      # --strict: a release with any variable unset FAILS. The previous version
      # of this step printed "unset — keeping the checked-in default" and
      # published anyway, so a misconfigured release shipped a package pointing
      # at whatever was committed. A release that cannot see its config must
      # not guess.
      - name: Bake build config (staging + production)
        env:
          # Repository variables, not secrets — their values are meant to ship
          # in the published package source.
          STAGING_ADDRESSIQ_API_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_API_BASE_URL }}
          STAGING_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_BASE_URL }}
          STAGING_ADDRESSIQ_CDN_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_BASE_URL }}
          PROD_ADDRESSIQ_API_BASE_URL: ${{ vars.PROD_ADDRESSIQ_API_BASE_URL }}
          PROD_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_BASE_URL }}
          PROD_ADDRESSIQ_CDN_BASE_URL: ${{ vars.PROD_ADDRESSIQ_CDN_BASE_URL }}
        run: scripts/bake-build-config.sh --strict

      # `dart pub publish` refuses to publish from a dirty git tree, and the bake
      # step above rewrites a CHECKED-IN file (lib/src/generated/build_config.dart)
      # by design — the published package must carry the baked hosts + widget pin,
      # not the local defaults.
      #
      # This never fired before because the baked output happened to be identical
      # to the committed defaults, so the tree stayed clean. The moment a web
      # release fanned out `.widget-version` / `.widget-integrity`, the bake
      # produced a real diff and pub.dev rejected the publish.
      #
      # Commit it LOCALLY (never pushed) so the working tree is clean for pub. The
      # commit exists only inside this runner.
      - name: Commit the baked config locally (pub requires a clean tree)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Bake produced no diff — nothing to commit."
          else
            git --no-pager diff --cached --stat
            git commit -q -m "chore: bake build config for release (local, not pushed)"
          fi

      - name: Publish
        env:
          # Repository variable, not a secret — its value is meant to be visible.
          PUB_DEV_PUBLISH: ${{ vars.PUB_DEV_PUBLISH }}
        run: |
          set -euo pipefail

          REAL=false
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            REAL=true
          fi

          # Fail safe, not fail open: anything other than exactly "true" means
          # dry run. An unset variable expands to "" and lands here too.
          if [ "$REAL" = "true" ] && [ "${PUB_DEV_PUBLISH:-}" != "true" ]; then
            echo "::warning::PUB_DEV_PUBLISH is not 'true' (got '${PUB_DEV_PUBLISH:-<unset>}') — refusing to publish to pub.dev. Running a dry run instead."
            REAL=false
          fi

          if [ "$REAL" = "true" ]; then
            echo "PUB_DEV_PUBLISH=true — publishing ${GITHUB_REF_NAME:-} to pub.dev. This is permanent."
            dart pub publish --force
          else
            dart pub publish --dry-run
          fi
