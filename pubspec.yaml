name: addressiq_sdk
description: >-
  AddressIQ address verification SDK for Flutter — background location
  collection, address capture UI, and the verify lifecycle for KYC and
  fraud detection in emerging markets.
version: 0.10.1
homepage: https://github.com/PTLRepoHub/addressiq-flutter
repository: https://github.com/PTLRepoHub/addressiq-flutter
issue_tracker: https://github.com/PTLRepoHub/addressiq-flutter/issues
topics: [address, geolocation, kyc, verification, fraud]

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Runtime for the generated wire-contract bindings under lib/src/proto
  # (source of truth: PTLRepoHub/AddressIq-proto).
  protobuf: ^3.1.0
  fixnum: ^1.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  geolocator: ^12.0.0
  image_picker: ^1.0.0
  # Collect UI map flow: interactive Google map (Maps JS) + Street View render
  # in a WebView — dependency-free vs the native Google Maps SDK.
  webview_flutter: ^4.4.0
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/iqcollect.js
